<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Teaching Content Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>
<body class="bg-body-tertiary">
  <div class="container" style="max-width: 400px">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h1 class="h4 mb-1"><i class="bi bi-mortarboard-fill me-2"></i>Content Review</h1>
        <p class="text-muted small mb-4">Sign in to continue</p>

        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label">User ID</label>
            <input class="form-control" name="user_id" autocomplete="username" autofocus required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">PrepGraph · internal tool</p>
  </div>
</body>
</html>
